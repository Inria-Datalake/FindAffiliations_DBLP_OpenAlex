name: Test OpenAlex (dev branch)

on:
  workflow_dispatch:
    inputs:
      annee_min:
        description: "Année minimum"
        required: true
        default: "2021"
      annee_max:
        description: "Année maximum"
        required: true
        default: "2025"
      cible_dblp:
        description: "URL DBLP"
        required: true
        default: "https://dblp.org/db/conf/uss/index.xml"
      nom_fichier:
        description: "Nom du fichier de sortie"
        required: true
        default: "uss_affiliations.xlsx"

  push:
    branches: [ github-actions-test ]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl python-dotenv

      - name: Run script
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          ANNEE_MIN: ${{ github.event.inputs.annee_min }}
          ANNEE_MAX: ${{ github.event.inputs.annee_max }}
          CIBLE_DBLP: ${{ github.event.inputs.cible_dblp }}
          NOM_FICHIER: ${{ github.event.inputs.nom_fichier }}
        run: python FindAffiliations_DBLP_OpenAlex.ipynb

      - name: Upload Excel result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultat
          path: ${{ github.event.inputs.nom_fichier }}
          if-no-files-found: warn
